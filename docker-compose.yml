services:
  mysql:
    image: mysql:8.4
    container_name: cia-mysql
    command: --default-authentication-plugin=mysql_native_password
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: competitor_ad_intelligence
    ports:
      - "3306:3306"
    volumes:
      - cia_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 30

  redis:
    image: redis:7.2-alpine
    container_name: cia-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - cia_redis_data:/data

volumes:
  cia_mysql_data:
  cia_redis_data:
